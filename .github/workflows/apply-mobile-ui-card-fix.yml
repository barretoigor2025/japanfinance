name: Apply Mobile UI and Card Tab Fix

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-mobile-ui-card-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch responsive turn cards and card tab
        run: |
          python3 - <<'PY'
          from pathlib import Path

          entries = Path('src/screens/Entries.jsx')
          s = entries.read_text()
          old = '''                  <div className="flex items-start gap-3">
                    {/* Date block */}
                    <div className="shrink-0 text-center w-10">
                      <div className="text-lg font-bold font-mono leading-tight" style={{ color: "var(--text)" }}>
                        {e.date.slice(8)}
                      </div>
                      <div className="text-xs" style={{ color: "var(--text-muted)" }}>
                        {new Date(e.date + "T12:00:00").toLocaleDateString("pt-BR", { weekday: "short" })}
                      </div>
                    </div>

                    {/* Main content */}
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-1.5 flex-wrap">
                        {e.dayType !== "yukyu" ? (
                          <span className="text-sm font-medium" style={{ color: "var(--text)" }}>{e.start} → {e.end}</span>
                        ) : (
                          <span className="text-sm font-medium" style={{ color: "var(--positive)" }}>有給休暇</span>
                        )}
                        {badge && <Badge color={badge.color}>{badge.label}</Badge>}
                      </div>
                      <div className="flex items-center gap-2 mt-1 flex-wrap">
                        {e.dayType !== "yukyu" && <span className="text-xs" style={{ color: "var(--text-muted)" }}>{formatMinutes(c?.totalMin)}</span>}
                        {c?.overtimeHours > 0 && <Badge color="yellow">HE {formatMinutes(c.overtimeDailyMin)}</Badge>}
                        {c?.nightHours > 0 && <Badge color="purple">🌙 {formatMinutes(c.nightMin)}</Badge>}
                        {e.note && <span className="text-xs italic truncate" style={{ color: "var(--text-muted)" }}>{e.note}</span>}
                      </div>
                      {deleteId === e.id && (
                        <div className="mt-2">
                          <ConfirmBar
                            message="Excluir este lançamento?"
                            onConfirm={() => { onDeleteEntry(e.id); setDeleteId(null); }}
                            onCancel={() => setDeleteId(null)}
                          />
                        </div>
                      )}
                    </div>

                    {/* Pay + actions */}
                    <div className="shrink-0 text-right">
                      <div className="text-sm font-mono font-bold" style={{ color: "var(--positive)" }}>{YEN(c?.grossPay)}</div>
                      <div className="flex gap-1 mt-1 justify-end">
                        <button onClick={() => setDetailEntry(e)} className="px-1.5 py-0.5 rounded text-xs" style={{ color: "var(--text-muted)", border: "1px solid var(--border-mid)" }}>≡</button>
                        <button onClick={() => setEditEntry(e)} className="px-1.5 py-0.5 rounded text-xs" style={{ color: "var(--text-muted)", border: "1px solid var(--border-mid)" }}>✎</button>
                        <button onClick={() => { onAddEntry({ ...e, id: Date.now().toString() }); }} className="px-1.5 py-0.5 rounded text-xs" style={{ color: "var(--text-muted)", border: "1px solid var(--border-mid)" }}>⎘</button>
                        <button onClick={() => setDeleteId(e.id)} className="px-1.5 py-0.5 rounded text-xs" style={{ color: "var(--negative)", border: "1px solid var(--border-mid)" }}>✕</button>
                      </div>
                    </div>
                  </div>'''
          new = '''                  <div className="flex gap-3">
                    <div className="shrink-0 text-center w-10 pt-0.5">
                      <div className="text-xl font-bold font-mono leading-none" style={{ color: "var(--text)" }}>{e.date.slice(8)}</div>
                      <div className="text-xs mt-1" style={{ color: "var(--text-muted)" }}>
                        {new Date(e.date + "T12:00:00").toLocaleDateString("pt-BR", { weekday: "short" })}
                      </div>
                    </div>

                    <div className="flex-1 min-w-0">
                      <div className="flex items-start justify-between gap-2">
                        <div className="min-w-0">
                          {e.dayType !== "yukyu" ? (
                            <div className="text-base font-semibold leading-tight whitespace-nowrap" style={{ color: "var(--text)" }}>{e.start} → {e.end}</div>
                          ) : (
                            <div className="text-base font-semibold leading-tight" style={{ color: "var(--positive)" }}>有給休暇</div>
                          )}
                          <div className="text-xs mt-1" style={{ color: "var(--text-muted)" }}>
                            {e.dayType !== "yukyu" ? formatMinutes(c?.totalMin) : "8h"}
                          </div>
                        </div>
                        <div className="shrink-0 text-right">
                          <div className="text-base font-mono font-bold leading-tight" style={{ color: "var(--positive)" }}>{YEN(c?.grossPay)}</div>
                        </div>
                      </div>

                      <div className="flex items-center gap-2 mt-2 flex-wrap clear-both">
                        {badge && <Badge color={badge.color}>{badge.label}</Badge>}
                        {c?.overtimeHours > 0 && <Badge color="yellow">HE {formatMinutes(c.overtimeDailyMin)}</Badge>}
                        {c?.nightHours > 0 && <Badge color="purple">🌙 {formatMinutes(c.nightMin)}</Badge>}
                        {e.note && <span className="text-xs italic truncate max-w-full" style={{ color: "var(--text-muted)" }}>{e.note}</span>}
                      </div>

                      <div className="flex justify-end gap-1.5 mt-3">
                        <button onClick={() => setDetailEntry(e)} className="w-9 h-8 rounded-lg text-xs" style={{ color: "var(--text-muted)", border: "1px solid var(--border-mid)", background: "var(--bg-elevated)" }}>≡</button>
                        <button onClick={() => setEditEntry(e)} className="w-9 h-8 rounded-lg text-xs" style={{ color: "var(--text-muted)", border: "1px solid var(--border-mid)", background: "var(--bg-elevated)" }}>✎</button>
                        <button onClick={() => { onAddEntry({ ...e, id: Date.now().toString() }); }} className="w-9 h-8 rounded-lg text-xs" style={{ color: "var(--text-muted)", border: "1px solid var(--border-mid)", background: "var(--bg-elevated)" }}>⎘</button>
                        <button onClick={() => setDeleteId(e.id)} className="w-9 h-8 rounded-lg text-xs" style={{ color: "var(--negative)", border: "1px solid var(--border-mid)", background: "var(--bg-elevated)" }}>✕</button>
                      </div>

                      {deleteId === e.id && (
                        <div className="mt-2">
                          <ConfirmBar
                            message="Excluir este lançamento?"
                            onConfirm={() => { onDeleteEntry(e.id); setDeleteId(null); }}
                            onCancel={() => setDeleteId(null)}
                          />
                        </div>
                      )}
                    </div>
                  </div>'''
          if old not in s:
              raise SystemExit('Entries block not found')
          entries.write_text(s.replace(old, new))

          cartao = Path('src/screens/Cartao.jsx')
          cartao.write_text(r'''import { useEffect, useState } from "react";
import { Card, MonthPicker } from "../components/ui.jsx";
import { YEN, currentMonth } from "../utils/fmt.js";

const CATS = [
  { id: "mercado_jp", label: "Supermercado", icon: "🛒" },
  { id: "konbini", label: "Konbini", icon: "🏪" },
  { id: "restaurante", label: "Restaurante", icon: "🍜" },
  { id: "posto", label: "Combustível", icon: "⛽" },
  { id: "online", label: "Online/Amazon", icon: "💻" },
  { id: "homecenter", label: "Home Center", icon: "🔨" },
  { id: "mercado_br", label: "Brasil", icon: "🇧🇷" },
  { id: "outro", label: "Outro", icon: "📦" },
];
const CAT_MAP = Object.fromEntries(CATS.map(c => [c.id, c]));
const emptyCard = { setup: { name: "", closingDay: 15, dueDay: 11, limit: 0 }, lancamentos: [], parcelas: [], conferencias: [] };

function catInfo(id) { return CAT_MAP[id] || CAT_MAP.outro; }

function CardItemModal({ initial, onSave, onDelete, onClose }) {
  const [date, setDate] = useState(initial?.date || new Date().toISOString().slice(0, 10));
  const [cat, setCat] = useState(initial?.cat || "mercado_jp");
  const [desc, setDesc] = useState(initial?.desc || "");
  const [amount, setAmount] = useState(initial?.amount ? String(initial.amount) : "");
  const [confirmDelete, setConfirmDelete] = useState(false);

  const inputStyle = { background: "var(--bg-elevated)", border: "1px solid var(--border-mid)", color: "var(--text)" };
  function save() {
    const value = parseInt(String(amount).replace(/[^0-9]/g, ""), 10) || 0;
    if (value <= 0) return;
    onSave({ id: initial?.id || `${Date.now()}_card`, date, cat, desc: desc.trim(), amount: value, customCat: initial?.customCat || "" });
  }

  return (
    <div className="fixed inset-0 z-50 flex items-end" style={{ background: "rgba(0,0,0,.75)" }} onClick={onClose}>
      <div className="w-full max-w-lg mx-auto rounded-t-2xl p-4 space-y-3" style={{ background: "var(--bg-card)", border: "1px solid var(--border)" }} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between">
          <h3 className="text-sm font-bold" style={{ color: "var(--text)" }}>💳 {initial?.id ? "Editar lançamento" : "Novo lançamento"}</h3>
          <button onClick={onClose} className="text-2xl" style={{ color: "var(--text-muted)" }}>×</button>
        </div>
        <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full rounded-xl px-3 py-2 text-sm" style={inputStyle} />
        <div className="grid grid-cols-2 gap-2">
          {CATS.map(c => (
            <button key={c.id} onClick={() => setCat(c.id)} className="flex items-center gap-2 rounded-xl px-3 py-2 text-xs text-left" style={{ background: cat === c.id ? "rgba(168,85,247,.20)" : "var(--bg-elevated)", border: `1px solid ${cat === c.id ? "rgba(168,85,247,.55)" : "var(--border-mid)"}`, color: cat === c.id ? "var(--night)" : "var(--text-sub)" }}>
              <span>{c.icon}</span><span className="truncate">{c.label}</span>
            </button>
          ))}
        </div>
        <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="Descrição" className="w-full rounded-xl px-3 py-2 text-sm" style={inputStyle} />
        <input type="number" inputMode="numeric" value={amount} onChange={e => setAmount(e.target.value)} placeholder="Valor em yen" className="w-full rounded-xl px-3 py-3 text-2xl font-bold font-mono text-right" style={inputStyle} />
        <div className="flex gap-2">
          {initial?.id && !confirmDelete && <button onClick={() => setConfirmDelete(true)} className="px-4 rounded-xl" style={{ color: "var(--negative)", border: "1px solid var(--border-mid)" }}>🗑</button>}
          {confirmDelete && <button onClick={() => onDelete(initial.id)} className="px-4 rounded-xl text-white" style={{ background: "var(--negative)" }}>Confirmar</button>}
          <button onClick={onClose} className="flex-1 py-3 rounded-xl text-sm" style={{ color: "var(--text-sub)", border: "1px solid var(--border-mid)" }}>Cancelar</button>
          <button onClick={save} className="flex-1 py-3 rounded-xl text-sm font-bold text-white" style={{ background: "var(--night)" }}>Salvar</button>
        </div>
      </div>
    </div>
  );
}

export function Cartao({ cartao, onSave }) {
  const data = cartao || emptyCard;
  const [month, setMonth] = useState(currentMonth());
  const [modal, setModal] = useState(null);
  const items = data.lancamentos || [];

  useEffect(() => {
    if (!items.length) return;
    const months = [...new Set(items.map(i => i.date?.slice(0, 7)).filter(Boolean))].sort();
    if (months.length) setMonth(months[months.length - 1]);
  }, [cartao]);

  const monthItems = items.filter(i => i.date?.slice(0, 7) === month).sort((a, b) => b.date.localeCompare(a.date));
  const total = monthItems.reduce((s, i) => s + (i.amount || 0), 0);
  const setup = data.setup || emptyCard.setup;
  const byCat = monthItems.reduce((acc, i) => { const k = i.cat || "outro"; acc[k] = (acc[k] || 0) + (i.amount || 0); return acc; }, {});
  const cats = Object.entries(byCat).sort((a, b) => b[1] - a[1]);

  function saveCard(next) { onSave({ ...emptyCard, ...data, ...next }); }
  function addItem(item) { saveCard({ lancamentos: [item, ...items] }); setModal(null); setMonth(item.date.slice(0, 7)); }
  function updateItem(item) { saveCard({ lancamentos: items.map(i => i.id === item.id ? item : i) }); setModal(null); }
  function deleteItem(id) { saveCard({ lancamentos: items.filter(i => i.id !== id) }); setModal(null); }

  return (
    <div className="space-y-3 pb-24">
      <div className="flex items-center justify-between">
        <div>
          <div className="text-xs uppercase tracking-widest" style={{ color: "var(--text-muted)" }}>Cartão</div>
          <h1 className="text-lg font-bold" style={{ color: "var(--text)" }}>💳 Cartão de Crédito</h1>
          <div className="text-xs mt-0.5" style={{ color: "var(--text-muted)" }}>{setup.name || "Cartão"} · fecha dia {setup.closingDay || 15} · vence dia {setup.dueDay || 11}</div>
        </div>
        <button onClick={() => setModal({})} className="px-3 py-2 rounded-xl text-xs font-bold text-white" style={{ background: "var(--night)" }}>+ Lançar</button>
      </div>
      <MonthPicker value={month} onChange={setMonth} />
      <Card style={{ borderColor: "rgba(168,85,247,.35)" }}>
        <div className="flex items-center justify-between gap-3">
          <div>
            <div className="text-xs uppercase tracking-widest" style={{ color: "var(--text-muted)" }}>Total do mês</div>
            <div className="text-xs" style={{ color: "var(--text-muted)" }}>{monthItems.length} lançamento{monthItems.length === 1 ? "" : "s"}</div>
          </div>
          <div className="text-2xl font-bold font-mono" style={{ color: "var(--night)" }}>{YEN(total)}</div>
        </div>
        {cats.length > 0 && <div className="mt-3 space-y-2">{cats.map(([id, amount]) => { const c = catInfo(id); return <div key={id} className="flex items-center gap-2"><div className="w-28 shrink-0 flex items-center gap-1 text-xs" style={{ color: "var(--text-muted)" }}><span>{c.icon}</span><span className="truncate">{c.label}</span></div><div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background: "var(--bg-elevated)" }}><div className="h-full rounded-full" style={{ width: `${total ? (amount / total) * 100 : 0}%`, background: "var(--night)" }} /></div><div className="w-20 text-right text-xs font-mono" style={{ color: "var(--text-sub)" }}>{YEN(amount)}</div></div>; })}</div>}
      </Card>
      {monthItems.length === 0 ? <Card><div className="text-center py-8"><div className="text-3xl mb-2">💳</div><div className="text-sm" style={{ color: "var(--text-muted)" }}>Nenhum lançamento nesse mês</div></div></Card> : <Card><div className="space-y-1">{monthItems.map(item => { const c = catInfo(item.cat); return <button key={item.id} onClick={() => setModal(item)} className="w-full flex items-center gap-2 py-2.5 border-b last:border-0 text-left" style={{ borderColor: "var(--border)" }}><span className="text-lg shrink-0">{c.icon}</span><div className="flex-1 min-w-0"><div className="text-sm truncate" style={{ color: "var(--text)" }}>{item.desc || c.label}</div><div className="text-xs" style={{ color: "var(--text-muted)" }}>{item.date?.slice(5).replace("-", "/")} · {c.label}</div></div><span className="text-sm font-mono font-bold shrink-0" style={{ color: "var(--night)" }}>{YEN(item.amount)}</span></button>; })}</div></Card>}
      {modal !== null && <CardItemModal initial={modal.id ? modal : null} onSave={modal.id ? updateItem : addItem} onDelete={modal.id ? deleteItem : null} onClose={() => setModal(null)} />}
    </div>
  );
}
''')

          app = Path('src/App.jsx')
          s = app.read_text()
          if 'import { Cartao } from "./screens/Cartao.jsx";' not in s:
              s = s.replace('import { SuperFinance } from "./screens/SuperFinance.jsx";\n', 'import { SuperFinance } from "./screens/SuperFinance.jsx";\nimport { Cartao } from "./screens/Cartao.jsx";\n')
          if '{ id: "cartao", label: "Cartão", icon: "💳" },' not in s:
              s = s.replace('  { id: "gastos", label: "Gastos", icon: "💰" },\n', '  { id: "gastos", label: "Gastos", icon: "💰" },\n  { id: "cartao", label: "Cartão", icon: "💳" },\n')
          render_line = '        {tab === "gastos" && <Gastos gastos={gastos} setGastos={setGastos} carro={carro} setCarro={setCarro} />}\n'
          cartao_line = '        {tab === "cartao" && <Cartao cartao={extras?.cartao} onSave={async (cartao) => { const next = { ...extras, cartao }; await dbSet("extras", next); setExtras(next); }} />}\n'
          if cartao_line not in s:
              s = s.replace(render_line, render_line + cartao_line)
          app.write_text(s)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add src/screens/Entries.jsx src/screens/Cartao.jsx src/App.jsx
          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "Fix mobile turn cards and add independent card tab"
            git push
          fi
